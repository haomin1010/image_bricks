fileroot: "/mnt/data/image_bricks/VAGEN"

envs:
  - name: BrickIsaacPartialView
    n_envs: 1
    tag_id: isaac_eval_partial_view
    seed: [1001, 1001, 1]
    split: test
    max_turns: 15
    config:
      backend: isaac
      dataset_root: ${fileroot}/assets/dataset_v2/small_size4
      eval_all_dataset_entries: true
      n_views: 5
      image_size: [224, 224]
      max_steps: 200
      format_reward: ${oc.env:VAGEN_ISAAC_FORMAT_REWARD,0.1}
      correct_placement_reward: ${oc.env:VAGEN_ISAAC_CORRECT_PLACEMENT_REWARD,1.0}
      floating_placement_penalty: ${oc.env:VAGEN_ISAAC_FLOATING_PLACEMENT_PENALTY,-10.0}
      non_candidate_penalty: ${oc.env:VAGEN_ISAAC_NON_CANDIDATE_PENALTY,-5.0}
      max_attempts_factor: ${oc.env:VAGEN_ISAAC_MAX_ATTEMPTS_FACTOR,1.5}
      ground_truth_root: ${oc.env:VAGEN_ISAAC_GROUND_TRUTH_ROOT,}
      collapse_mock_after_attempt: ${oc.env:VAGEN_ISAAC_COLLAPSE_MOCK_AFTER_ATTEMPT,-1}
    chat_config:
      temperature: 0
      max_tokens: 64
      top_p: 1.0
      extra_body:
        enable_thinking: ${oc.decode:${oc.env:VAGEN_ENABLE_THINKING,0}}
        thinking_budget: ${oc.decode:${oc.env:VAGEN_THINKING_BUDGET,2048}}

experiment:
  dump_dir: ${fileroot}/outputs/eval_isaac
  default_max_turns: 10

run:
  backend: "sglang"
  base_seed: 0
  max_concurrent_jobs: 1
  resume: overwrite
  live_summary: true

backends:
  sglang:
    base_url: "http://127.0.0.1:30000/v1"
    api_key: "EMPTY"
    model: "Qwen/Qwen2.5-VL-3B-Instruct"
    max_concurrency: 1
    max_retries: 6
    min_backoff: 0.5
    max_backoff: 8.0

  qwen:
    base_url: null
    api_key: ""
    model: "qwen3-vl-plus"
    max_concurrency: 2
    max_retries: 6
    min_backoff: 0.5
    max_backoff: 8.0

  openai:
    api_key: ""
    base_url: null
    model: "gpt-4o-mini"
    max_concurrency: 2
    max_retries: 6
    min_backoff: 0.5
    max_backoff: 8.0

  claude:
    api_key: ""
    base_url: null
    model: "claude-3-5-sonnet-latest"
    max_concurrency: 2
    max_retries: 6
    min_backoff: 0.5
    max_backoff: 8.0
